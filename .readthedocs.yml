version: 2

build:
  apt_packages:
    - gfortran
  os: ubuntu-24.04
  tools:
    python: '3.12'
  jobs:
    install:
      # See https://docs.readthedocs.com/platform/stable/build-customization.html#install-dependencies-from-dependency-groups
      - pip install --upgrade pip
      - pip install --group 'docs' .

sphinx:
  configuration: docs/conf.py
